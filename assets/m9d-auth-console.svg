<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">M9d-Auth console client details screen</title>
  <desc id="desc">A Maintainerd Auth console screen showing the client details page with top navigation, left sidebar, client header, tabs, and overview panels.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#0f172a" flood-opacity=".14"/>
    </filter>
    <style>
      .mono{font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,"Liberation Mono",monospace}
      .sans{font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
      .muted{fill:#64748b}
      .ink{fill:#0f172a}
      .line{stroke:#e2e8f0;stroke-width:1}
      .card{fill:#fff;stroke:#e2e8f0;stroke-width:1.2}
    </style>
  </defs>

  <rect width="1600" height="900" fill="#f8fafc"/>
  <rect width="1600" height="48" fill="#171717"/>

  <g transform="translate(18 10)">
    <path d="M18 0 34 7v12c0 11.2-6.6 19.8-16 22.8C8.6 38.8 2 30.2 2 19V7L18 0Z" fill="#2563eb"/>
    <text class="sans" x="46" y="23" font-size="18" font-weight="700" fill="#fff">M9d-Auth</text>
    <rect x="152" y="5" width="22" height="22" rx="7" fill="#3f3f46"/>
    <text class="sans" x="159" y="21" font-size="11" font-weight="700" fill="#fff">M</text>
    <text class="sans" x="184" y="22" font-size="14" font-weight="600" fill="#fff">maintainerd</text>
  </g>

  <g class="sans" fill="#d4d4d8" font-size="13">
    <text x="1210" y="30">Documentation</text>
    <text x="1314" y="30">API Reference</text>
    <text x="1410" y="30">Community</text>
    <circle cx="1510" cy="24" r="6" fill="#ef4444"/>
    <text x="1507" y="28" font-size="10" font-weight="700" fill="#fff">3</text>
    <circle cx="1572" cy="24" r="14" fill="#27272a"/>
    <text x="1564" y="29" font-size="12" font-weight="700" fill="#fff">RE</text>
  </g>

  <rect y="48" width="214" height="852" fill="#fff"/>
  <line x1="214" y1="48" x2="214" y2="900" class="line"/>

  <g class="sans" transform="translate(20 78)">
    <text x="0" y="0" font-size="12" fill="#52525b">Overview</text>
    <text x="22" y="28" font-size="14" fill="#18181b">Get Started</text>

    <text x="0" y="68" font-size="12" fill="#52525b">Identity &amp; Access</text>
    <text x="22" y="96" font-size="14" fill="#18181b">User Management</text>
    <text x="22" y="126" font-size="14" fill="#18181b">Authentication</text>

    <text x="0" y="166" font-size="12" fill="#52525b">Applications &amp; APIs</text>
    <text x="22" y="194" font-size="14" fill="#18181b">Applications</text>
    <text x="42" y="224" font-size="14" fill="#18181b">Clients</text>
    <text x="42" y="254" font-size="14" fill="#18181b">API Keys</text>
    <text x="22" y="284" font-size="14" fill="#18181b">APIs &amp; Resources</text>
    <text x="42" y="314" font-size="14" fill="#18181b">Services</text>
    <text x="42" y="344" font-size="14" fill="#18181b">APIs</text>
    <text x="42" y="374" font-size="14" fill="#18181b">Permissions</text>
    <text x="42" y="404" font-size="14" fill="#18181b">Policies</text>

    <text x="0" y="444" font-size="12" fill="#52525b">Security</text>
    <text x="22" y="472" font-size="14" fill="#18181b">Security</text>

    <text x="0" y="512" font-size="12" fill="#52525b">Operations</text>
    <text x="22" y="540" font-size="14" fill="#18181b">Events &amp; Webhooks</text>
    <text x="22" y="570" font-size="14" fill="#18181b">Monitoring</text>

    <text x="0" y="610" font-size="12" fill="#52525b">Administration</text>
    <text x="22" y="638" font-size="14" fill="#18181b">Organization</text>
    <text x="22" y="668" font-size="14" fill="#18181b">Settings</text>
  </g>

  <g transform="translate(430 84)">
    <text class="sans muted" x="0" y="0" font-size="14">← Back to Clients</text>
  </g>

  <g transform="translate(430 118)" filter="url(#shadow)">
