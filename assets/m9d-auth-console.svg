    <rect x="20" y="24" width="48" height="48" rx="12" fill="#f1f5f9"/>
    <rect x="34" y="38" width="20" height="16" rx="2" fill="none" stroke="#64748b" stroke-width="2"/>
    <line x1="34" y1="43" x2="54" y2="43" stroke="#64748b" stroke-width="2"/>
    <text class="sans ink" x="84" y="45" font-size="20" font-weight="700">Maintainerd Auth Console</text>
    <rect x="282" y="30" width="62" height="20" rx="10" fill="#f8fafc" stroke="#e2e8f0"/>
    <circle cx="294" cy="40" r="3" fill="#10b981"/>
    <text class="sans ink" x="304" y="45" font-size="12" font-weight="600">Active</text>
    <rect x="352" y="30" width="68" height="20" rx="10" fill="#f8fafc" stroke="#e2e8f0"/>
    <text class="sans ink" x="374" y="45" font-size="12" font-weight="600">System</text>
    <text class="mono muted" x="84" y="66" font-size="13">auth-console</text>
    <rect x="886" y="24" width="54" height="32" rx="8" fill="#fff" stroke="#e2e8f0"/>
    <text class="sans ink" x="910" y="45" text-anchor="middle" font-size="14" font-weight="600">Edit</text>
    <line x1="20" y1="92" x2="940" y2="92" class="line"/>

    <g class="sans" font-size="13">
      <text class="muted" x="20" y="120" font-weight="700">CLIENT UUID</text>
      <text class="mono ink" x="20" y="140" font-size="12">4093f1b3-71e6-4b53-a899-50f05add5b04</text>
      <text class="muted" x="340" y="120" font-weight="700">CLIENT TYPE</text>
      <text class="ink" x="340" y="140">Single Page App</text>
      <text class="muted" x="660" y="120" font-weight="700">DOMAIN</text>
      <text class="mono ink" x="660" y="140" font-size="12">http://private.api.maintainerd.auth</text>
      <text class="muted" x="20" y="168" font-weight="700">CREATED</text>
      <text class="ink" x="20" y="188">Jun 12, 2026</text>
      <text class="muted" x="340" y="168" font-weight="700">LAST UPDATED</text>
      <text class="ink" x="340" y="188">Jun 12, 2026</text>
    </g>
  </g>

  <g class="sans" transform="translate(430 348)">
    <rect x="0" y="0" width="684" height="32" rx="8" fill="#f1f5f9"/>
    <g font-size="13" font-weight="700">
      <rect x="4" y="3" width="92" height="26" rx="7" fill="#fff" stroke="#e2e8f0"/>
      <text x="32" y="21" fill="#111827">Overview</text>
      <text x="130" y="21" fill="#111827">Credentials</text>
      <text x="238" y="21" fill="#111827">OAuth &amp; Tokens</text>
      <text x="382" y="21" fill="#111827">URIs &amp; Origins</text>
      <text x="504" y="21" fill="#111827">API Permissions</text>
      <text x="636" y="21" fill="#111827">Metadata</text>
    </g>
  </g>

  <g transform="translate(430 408)" filter="url(#shadow)">
    <rect class="card" width="960" height="258" rx="12"/>
    <text class="sans ink" x="20" y="36" font-size="16" font-weight="700">Client Overview</text>
    <text class="sans muted" x="20" y="60" font-size="13">Core client fields returned by the backend.</text>
    <g class="sans" font-size="14">
      <text class="muted" x="20" y="106">Display Name</text>
      <text class="ink" x="20" y="128">Maintainerd Auth Console</text>
      <text class="muted" x="340" y="106">Name</text>
      <text class="mono ink" x="340" y="128">auth-console</text>
      <text class="muted" x="660" y="106">Client UUID</text>
      <text class="mono ink" x="660" y="128" font-size="12">4093f1b3-71e6-4b53-a899-50f05add5b04</text>
      <text class="muted" x="20" y="166">Client Type</text>
      <text class="ink" x="20" y="188">Single Page Application</text>
      <text class="muted" x="340" y="166">Domain</text>
      <text class="mono ink" x="340" y="188" font-size="12">http://private.api.maintainerd.auth</text>
      <text class="muted" x="660" y="166">Status</text>
      <rect x="660" y="176" width="58" height="22" rx="11" fill="#f8fafc" stroke="#e2e8f0"/>
      <circle cx="674" cy="187" r="3" fill="#10b981"/>
      <text class="ink" x="684" y="191" font-size="12" font-weight="700">Active</text>
      <text class="muted" x="20" y="226">Created</text>
      <text class="ink" x="20" y="248">Jun 12, 2026, 5:56:16 PM</text>
      <text class="muted" x="340" y="226">Last Updated</text>
      <text class="ink" x="340" y="248">Jun 12, 2026, 5:56:16 PM</text>
    </g>
  </g>

  <g transform="translate(430 688)" filter="url(#shadow)">
    <rect class="card" width="960" height="160" rx="12"/>
    <text class="sans ink" x="20" y="36" font-size="16" font-weight="700">Identity Provider</text>
    <text class="sans muted" x="20" y="60" font-size="13">The provider pool this client authenticates through.</text>
    <rect x="20" y="88" width="34" height="34" rx="9" fill="#fff" stroke="#e2e8f0"/>
    <path d="M37 96 47 100v7c0 6.5-4.1 11.6-10 13.4-5.9-1.8-10-6.9-10-13.4v-7l10-4Z" fill="none" stroke="#0f172a" stroke-width="1.4"/>
    <text class="sans ink" x="66" y="104" font-size="14" font-weight="700">Built-in Authentication System</text>
    <rect x="240" y="90" width="50" height="20" rx="10" fill="#f8fafc" stroke="#e2e8f0"/>
    <text class="sans ink" x="252" y="104" font-size="11" font-weight="700">Internal</text>
    <rect x="298" y="90" width="58" height="20" rx="10" fill="#f8fafc" stroke="#e2e8f0"/>
    <circle cx="312" cy="100" r="3" fill="#10b981"/>
    <text class="sans ink" x="322" y="104" font-size="11" font-weight="700">Active</text>
    <text class="mono muted" x="66" y="126" font-size="12">EInByIPgFiQzIas</text>
  </g>
</svg>
